# Alembic configuration for CertificadosSecretaria.
#
# The database URL is NOT hardcoded here: it is resolved at runtime in
# database/migrations/env.py from DATABASE_URL (PostgreSQL in production) or a
# local SQLite file in development. Run from the repo root:
#
#   alembic upgrade head            # apply migrations
#   alembic revision --autogenerate -m "msg"   # author a new migration
#
[alembic]
script_location = database/migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is set programmatically in env.py (do not set it here).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
