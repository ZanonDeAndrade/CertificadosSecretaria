name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint, typecheck, tests, audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r certificados-admin/backEnd/requirements.txt
          pip install -r certificados-consulta/requirements.txt
          pip install ruff pip-audit pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Typecheck / syntax (compileall)
        run: python -m compileall -q certificados-admin/backEnd certificados-consulta database storage_service observability

      - name: Alembic migrations apply + no drift (SQLite)
        env:
          DATABASE_URL: "sqlite:///./ci_check.db"
        run: |
          python -m alembic upgrade head
          python -m alembic check
          rm -f ci_check.db

      - name: Tests
        working-directory: certificados-admin/backEnd
        run: python -m pytest tests -p no:randomly -q

      - name: Dependency audit (pip-audit, non-blocking)
        continue-on-error: true
        run: |
          pip-audit -r certificados-admin/backEnd/requirements.txt
          pip-audit -r certificados-consulta/requirements.txt

  frontend:
    name: Frontend (typecheck, build, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: certificados-admin/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: certificados-admin/frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck + build (tsc -b && vite build)
        run: npm run build

      - name: Dependency audit (npm, non-blocking)
        continue-on-error: true
        run: npm audit --omit=dev

  secrets:
    name: Secret detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
