server {
    listen ${PORT};
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 15m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass https://${ADMIN_API_HOST}/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${ADMIN_API_HOST};

        proxy_set_header Host ${ADMIN_API_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 30s;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_buffering off;
    }

    location /consulta-api/ {
        proxy_pass https://${CONSULTA_API_HOST}/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${CONSULTA_API_HOST};

        proxy_set_header Host ${CONSULTA_API_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
