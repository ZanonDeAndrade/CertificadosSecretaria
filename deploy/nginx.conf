# ──────────────────────────────────────────────────────────────────────────────
# Porta 80  → site PÚBLICO (consulta).  Porta 8080 → ADMIN (SPA React + API).
# Para HTTPS (após ter domínio), troque 'listen 80/8080;' por 'listen 443 ssl;'
# (e 8443), adicione ssl_certificate/ssl_certificate_key e um redirect 80→443.
# ──────────────────────────────────────────────────────────────────────────────

# Público (alunos)
server {
    listen 80;
    server_name _;
    client_max_body_size 5m;

    location / {
        proxy_pass http://consulta:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Administrativo (secretaria) — SPA estático + proxy /api → backend admin.
server {
    listen 8080;
    server_name _;
    client_max_body_size 15m;             # uploads de planilha (.xlsx)
    root /usr/share/nginx/html;
    index index.html;

    # OPCIONAL (recomendado após a fase de testes): restringir por rede do campus.
    # allow 10.0.0.0/8;
    # allow 192.168.0.0/16;
    # deny  all;

    location /api/ {
        proxy_pass http://admin:8000/;     # a barra final remove o prefixo /api
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;           # geração de lotes grandes pode demorar
        proxy_send_timeout 600s;
    }

    # SPA React: rotas do cliente caem no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
